services:
  - type: web
    name: laura-api
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev
    startCommand: bash server/scripts/render-start.sh
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        value: postgresql://bsdc_user:tHAIZrPB2zaTXPLr7srJYyLw8c9Wpub0@dpg-d6ktoufafjfc73emvbtg-a/bsdc?schema=laura
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: laura-client
          property: url
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DEBUG_MODE
        value: "false"
      - key: RUN_SEED_ON_DEPLOY
        value: "true"

  - type: web
    name: laura-client
    runtime: static
    buildCommand: npm ci && npm run build --workspace client
    staticPublishPath: client/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: laura-api
          property: url
      - key: VITE_DEBUG_MODE
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
